services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "40000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      governance:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- Governance Service (Production) ---
  governance:
    build:
      context: .
      dockerfile: Dockerfile.governance
    expose:
      - "40006"
    volumes:
      - ./shared-volume/codex-tasks/state/governance:/app/shared-volume/codex-tasks/state/governance
      - .:/workspace:ro
      - C:/Users/z5866/Documents/Yings_work:/projects/yings-work:ro
    environment:
      - GOVERNANCE_PORT=40006
      - REDIS_URL=redis://redis:6379/0
      - DBSERVICE_URL=http://dbservice:40002
      - SHARED_VOLUME_PATH=/app/shared-volume
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:40006/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Governance Service (Development) ---
  governance-dev:
    build:
      context: .
      dockerfile: Dockerfile.governance
    expose:
      - "40007"
    ports:
      - "40007:40007"
    volumes:
      - ./shared-volume/codex-tasks/state/governance-dev:/app/shared-volume/codex-tasks/state/governance
      - .:/workspace:ro
    environment:
      - GOVERNANCE_PORT=40007
      - REDIS_URL=redis://redis:6379/1
      - DBSERVICE_URL=http://dbservice:40002
      - SHARED_VOLUME_PATH=/app/shared-volume
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:40007/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev

  # --- Telegram Gateway ---
  telegram-gateway:
    build:
      context: .
      dockerfile: Dockerfile.telegram-gateway
    expose:
      - "40010"
    volumes:
      - ./shared-volume/codex-tasks:/app/shared-volume/codex-tasks
    env_file:
      - .env
    environment:
      - GOVERNANCE_URL=http://governance:40006
      - REDIS_URL=redis://redis:6379/0
      - SHARED_VOLUME_PATH=/app/shared-volume
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-7848961760}
      - GATEWAY_PORT=40010
    depends_on:
      governance:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Memory Service ---
  dbservice:
    build:
      context: ./dbservice
    expose:
      - "40002"
    ports:
      - "40002:40002"
    volumes:
      - memory-data:/app/db
    environment:
      - DBSERVICE_PORT=40002
      - DBSERVICE_SAVE_PATH=/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:40002/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Redis ---
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "40079:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  memory-data:
    driver: local
